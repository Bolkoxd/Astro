<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Test Portal</title>
  <style>
    /* Reset some basic styles */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    /* Centering container for both sections */
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      text-align: center;
    }

    /* Styling for input fields and button */
    input {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    .error {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Student Entry Form -->
  <div class="container" id="loginFormContainer">
    <h2>Enter Your Details</h2>
    <input type="text" id="studentName" placeholder="Your Name" required />
    <input type="text" id="testCode1" placeholder="Enter Test Code" required />
    <button id="startTestBtn">Start Test</button>
    <p id="errorMsg" class="error">Invalid test code. Please try again.</p>
  </div>
  <script src="student-interface.js"></script>
</body>
</html>
